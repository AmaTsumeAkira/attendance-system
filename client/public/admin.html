<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>负责人扫码</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'PingFang SC', 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      padding: 25px;
      width: 100%;
      max-width: 450px;
      text-align: center;
      overflow: hidden;
    }
    h1 {
      color: #2c3e50;
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .video-wrapper {
      position: relative;
      width: 100%;
      padding-top: 75%; /* 默认 4:3 */
      background: #f1f3f5;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 2px solid #dfe6e9;
    }
    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.3s;
    }
    .scan-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 70%;
      height: 70%;
      border: 2px dashed #3498db;
      transform: translate(-50%, -50%);
      pointer-events: none;
      opacity: 0.7;
    }
    .video-wrapper.scanning .scan-overlay {
      animation: scanning 1s infinite;
    }
    @keyframes scanning {
      0% { border-color: #3498db; }
      50% { border-color: #2ecc71; }
      100% { border-color: #3498db; }
    }
    .controls {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    select {
      padding: 12px;
      border: 1px solid #dfe6e9;
      border-radius: 8px;
      font-size: 16px;
      background: #f8f9fa;
      color: #2c3e50;
      cursor: pointer;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    select:focus {
      border-color: #3498db;
      box-shadow: 0 0 5px rgba(52, 152, 219, 0.3);
    }
    button {
      background: #3498db;
      color: #ffffff;
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      transition: background 0.3s, transform 0.2s, box-shadow 0.3s;
    }
    button:hover {
      background: #2980b9;
      box-shadow: 0 4px 12px rgba(52, 152, 219, 0.3);
    }
    button:active {
      transform: scale(0.98);
      box-shadow: none;
    }
    #result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      font-size: 16px;
      line-height: 1.5;
      word-break: break-word;
      transition: all 0.3s;
    }
    #result.success {
      background: #e8f5e9;
      color: #27ae60;
      border: 1px solid #27ae60;
    }
    #result.success::before {
      content: "✅ ";
    }
    #result.error {
      background: #ffebee;
      color: #c0392b;
      border: 1px solid #c0392b;
    }
    #result.error::before {
      content: "❌ ";
    }
    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 25px;
      border-radius: 8px;
      font-size: 16px;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .toast.show {
      opacity: 1;
    }
    .toast.success {
      background: rgba(39, 174, 96, 0.9);
      color: #ffffff;
    }
    .toast.error {
      background: rgba(192, 57, 43, 0.9);
      color: #ffffff;
    }
    .toast.default {
      background: rgba(44, 62, 80, 0.9);
      color: #ffffff;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }
      .container {
        padding: 15px;
        max-width: 100%;
      }
      h1 {
        font-size: 22px;
        margin-bottom: 15px;
      }
      .video-wrapper {
        padding-top: 100%; /* 手机上 1:1 */
        margin-bottom: 12px;
      }
      .controls {
        gap: 8px;
      }
      select, button {
        font-size: 14px;
        padding: 10px 15px;
      }
      #result {
        font-size: 14px;
        padding: 10px;
        margin-top: 15px;
      }
      .toast {
        font-size: 14px;
        padding: 10px 20px;
        max-width: 90%;
      }
      #statsPanel, div[style*="background:#f8f9fa"] {
        padding: 10px !important;
      }
      #todaySummary span, #dateSummary span {
        font-size: 12px !important;
        padding: 4px 8px !important;
      }
      #leaderboardList, #dateRecordList {
        font-size: 13px !important;
      }
      input[type="date"] {
        font-size: 13px;
        padding: 8px !important;
        width: 100%;
        max-width: 160px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>负责人扫码签到</h1>
    <div class="video-wrapper">
      <video id="video" autoplay></video>
      <div class="scan-overlay"></div>
    </div>
    <div class="controls">
      <select id="cameraSelect">
        <option value="">选择摄像头</option>
      </select>
      <select id="statusSelect">
        <option value="present">出勤</option>
        <option value="absent">缺勤</option>
        <option value="late">迟到</option>
        <option value="leave">请假</option>
      </select>
      <button id="scanBtn">开始扫码</button>
    </div>
    <div id="result"></div>
    <div id="statsPanel" style="display:none; margin-top:20px; text-align:left;">
      <h3 style="color:#2c3e50; margin-bottom:12px; font-size:18px;">📊 签到统计</h3>
      <div id="attendanceRateBar" style="margin-bottom:15px; padding:10px; background:#f8f9fa; border-radius:8px;"></div>
      <div id="todaySummary" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:15px;"></div>
      <div id="leaderboard" style="margin-bottom:10px;">
        <h4 style="color:#555; font-size:15px; margin-bottom:8px;">🏆 出勤排行榜 (Top 10)</h4>
        <ol id="leaderboardList" style="padding-left:20px; font-size:14px; color:#333; line-height:1.8;"></ol>
      </div>
    </div>
    <button id="statsBtn" style="margin-top:15px; background:#2ecc71; font-size:14px;">📊 查看统计</button>
    <div style="margin-top:15px; padding:12px; background:#f8f9fa; border-radius:8px;">
      <div style="font-size:14px; color:#555; margin-bottom:10px;">📅 查询历史签到</div>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center;">
        <input type="date" id="queryDate" style="padding:8px; border:1px solid #dfe6e9; border-radius:6px; font-size:13px;">
        <button id="queryDateBtn" style="background:#16a085; font-size:13px; padding:10px 16px;">查询</button>
      </div>
      <div id="dateResultPanel" style="display:none; margin-top:12px; text-align:left;">
        <div id="dateSummary" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:10px;"></div>
        <ol id="dateRecordList" style="padding-left:20px; font-size:13px; color:#333; line-height:1.8; max-height:250px; overflow-y:auto;"></ol>
      </div>
    </div>
    <div style="margin-top:15px; padding:12px; background:#f8f9fa; border-radius:8px;">
      <div style="font-size:14px; color:#555; margin-bottom:10px;">📥 导出签到记录</div>
      <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:center;">
        <input type="date" id="exportStartDate" style="padding:8px; border:1px solid #dfe6e9; border-radius:6px; font-size:13px;">
        <span style="color:#999;">至</span>
        <input type="date" id="exportEndDate" style="padding:8px; border:1px solid #dfe6e9; border-radius:6px; font-size:13px;">
      </div>
      <button id="exportBtn" style="margin-top:10px; background:#8e44ad; font-size:13px; padding:10px 20px;">📥 导出签到记录 CSV</button>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <!-- 密码输入 Modal -->
  <div id="passwordModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; justify-content:center; align-items:center;">
    <div style="background:#fff; border-radius:16px; padding:30px; width:90%; max-width:360px; text-align:center; box-shadow:0 10px 40px rgba(0,0,0,0.2);">
      <h3 id="passwordModalTitle" style="color:#2c3e50; margin-bottom:16px; font-size:20px;">🔐 管理员认证</h3>
      <input type="password" id="passwordModalInput" placeholder="请输入管理员密码"
        style="width:100%; padding:12px; border:1px solid #dfe6e9; border-radius:8px; font-size:16px; outline:none; box-sizing:border-box;"
        onfocus="this.style.borderColor='#3498db'" onblur="this.style.borderColor='#dfe6e9'">
      <div id="passwordModalError" style="color:#c0392b; font-size:13px; margin-top:8px; min-height:20px;"></div>
      <div style="display:flex; gap:10px; margin-top:18px;">
        <button id="passwordModalCancel" style="flex:1; background:#95a5a6; padding:12px; border:none; border-radius:8px; color:#fff; font-size:15px; cursor:pointer;">取消</button>
        <button id="passwordModalConfirm" style="flex:1; background:#3498db; padding:12px; border:none; border-radius:8px; color:#fff; font-size:15px; cursor:pointer;">确认</button>
      </div>
    </div>
  </div>
  <script src="/jsQR.js"></script>
  <script src="/admin.js"></script>
</body>
</html>
